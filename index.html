<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marca País AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* PANTALLA DE INICIO (El "Truco") */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0056b3, #002d5f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
            transition: opacity 0.5s ease;
        }

        #start-screen img {
            width: 150px;
            margin-bottom: 30px;
        }

        #start-btn {
            padding: 15px 40px;
            background: white;
            color: #0056b3;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* UI de Escaneo */
        #ui-overlay {
            position: fixed;
            bottom: 40px;
            width: 100%;
            display: none; /* Se activa al iniciar */
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100;
            pointer-events: none;
        }

        .ar-button {
            display: none; 
            align-items: center;
            padding: 12px 25px;
            border-radius: 30px;
            background: white;
            color: #333;
            text-decoration: none;
            font-weight: bold;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #web-btn { background: #004a99; color: white; }
        #web-btn img { height: 20px; margin-right: 10px; }

        #scanning-guide {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" alt="Logo">
        <button id="start-btn">ENTRAR A LA EXPERIENCIA</button>
        <p style="margin-top: 20px; font-size: 0.8em; opacity: 0.8;">Permite el acceso a la cámara cuando se solicite</p>
    </div>

    <div id="scanning-guide">APUNTA A TU TARJETA</div>

    <div id="ui-overlay">
        <a id="web-btn" class="ar-button" href="https://marcapais.com.ve/" target="_blank">
            <img src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" alt="Logo">
            MARCA PAÍS WEB
        </a>
        <a id="download-btn" class="ar-button" href="video.mp4" download>
            📥 GUARDAR VIDEO
        </a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
          <video id="ar-video" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startScreen = document.querySelector('#start-screen');
      const startBtn = document.querySelector('#start-btn');
      const scene = document.querySelector('a-scene');
      const video = document.querySelector('#ar-video');
      const uiOverlay = document.querySelector('#ui-overlay');
      const guide = document.querySelector('#scanning-guide');
      const target = document.querySelector('#ar-target');

      // EL TRUCO: Al hacer clic aquí, desbloqueamos TODO
      startBtn.addEventListener('click', () => {
        startScreen.style.opacity = '0';
        setTimeout(() => {
            startScreen.style.display = 'none';
            uiOverlay.style.display = 'flex';
            guide.style.display = 'block';
            
            // Iniciamos la escena y el motor de AR
            scene.systems["mindar-image-system"].start(); 
            
            // Intentamos un play/pause rápido para asegurar el canal de audio
            video.play();
            video.pause();
        }, 500);
      });

      target.addEventListener("targetFound", () => {
        guide.style.display = "none";
        document.querySelectorAll('.ar-button').forEach(b => b.style.display = 'flex');
        video.play();
      });

      target.addEventListener("targetLost", () => {
        guide.style.display = "block";
        document.querySelectorAll('.ar-button').forEach(b => b.style.display = 'none');
        video.pause();
      });
    </script>
</body>
</html>
