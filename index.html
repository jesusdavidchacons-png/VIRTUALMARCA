<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marca País AR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root { --font-main: 'Montserrat', sans-serif; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: var(--font-main);
        }

        /* FIX CRÍTICO: Asegura que el canvas de la cámara sea visible */
        canvas {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999; color: white;
            transition: opacity 0.6s ease;
        }

        #start-btn {
            padding: 14px 40px; background: transparent; color: white;
            border: 1px solid rgba(255,255,255,0.4); border-radius: 2px;
            font-family: var(--font-main); font-weight: 300; font-size: 0.9em;
            letter-spacing: 3px; cursor: pointer; text-transform: uppercase;
        }

        #ui-overlay {
            position: fixed; bottom: 50px; width: 100%;
            display: none; flex-direction: column; align-items: center;
            gap: 12px; z-index: 1000; pointer-events: none;
        }

        .ar-button {
            display: none; align-items: center; justify-content: center;
            padding: 12px 30px; border-radius: 4px; 
            background: rgba(255, 255, 255, 0.95); color: #1a1a1a; 
            text-decoration: none; font-weight: 500; font-size: 0.8em;
            letter-spacing: 1.5px; text-transform: uppercase;
            pointer-events: auto; min-width: 240px;
        }

        #web-btn { background: #004a99; color: white; }
        #web-btn img { height: 18px; margin-right: 12px; filter: brightness(0) invert(1); }

        #download-btn {
            background: rgba(0, 0, 0, 0.7); color: white;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);
        }

        #scanning-guide {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; z-index: 1000; display: none;
            font-weight: 300; font-size: 0.75em; letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" alt="Logo" style="width:120px; margin-bottom:40px;">
        <button id="start-btn">Comenzar</button>
    </div>

    <div id="scanning-guide">Escaneando Tarjeta</div>

    <div id="ui-overlay">
        <a id="web-btn" class="ar-button" href="https://marcapais.com.ve/" target="_blank">
            <img src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" alt="Logo">
            Marca País Web
        </a>
        <a id="download-btn" class="ar-button" href="video.mp4" download>
            Guardar Video
        </a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startScreen = document.querySelector('#start-screen');
      const startBtn = document.querySelector('#start-btn');
      const scene = document.querySelector('a-scene');
      const video = document.querySelector('#ar-video');

      startBtn.addEventListener('click', () => {
        // Desbloquear audio
        video.play().then(() => video.pause()).catch(e => console.error(e));

        startScreen.style.opacity = '0';
        
        setTimeout(() => {
            startScreen.style.display = 'none';
            document.querySelector('#ui-overlay').style.display = 'flex';
            document.querySelector('#scanning-guide').style.display = 'block';

            // FORZAR INICIO DE CÁMARA
            const arSystem = scene.systems["mindar-image-system"];
            arSystem.start(); 

            // Pequeño hack de refresco para móviles
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 200);

        }, 600);
      });

      const target = document.querySelector('#ar-target');
      target.addEventListener("targetFound", () => {
        document.querySelector('#scanning-guide').style.display = "none";
        document.querySelectorAll('.ar-button').forEach(b => b.style.display = 'flex');
        video.play();
      });

      target.addEventListener("targetLost", () => {
        document.querySelector('#scanning-guide').style.display = "block";
        document.querySelectorAll('.ar-button').forEach(b => b.style.display = 'none');
        video.pause();
      });
    </script>
</body>
</html>
