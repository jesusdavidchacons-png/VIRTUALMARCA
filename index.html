<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Experience - Marca País</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }

        /* Contenedor de botones */
        #ui-overlay {
            position: fixed;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100;
            pointer-events: none;
        }

        .ar-button {
            padding: 12px 25px;
            border-radius: 25px;
            font-family: sans-serif;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none; 
            pointer-events: auto;
            min-width: 200px;
            text-align: center;
        }

        /* Botón Web - Azul Marca País */
        #web-btn {
            background-color: #0056b3;
            color: white;
        }

        /* Botón Descarga - Blanco/Gris */
        #download-btn {
            background-color: #ffffff;
            color: #333;
        }

        #scanning-guide {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            background: rgba(0,0,0,0.4);
            padding: 10px 0;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="scanning-guide">Escaneando tarjeta Marca País...</div>

    <div id="ui-overlay">
        <a id="web-btn" class="ar-button" href="https://marcapais.com.ve/" target="_blank">
            🌐 VISITAR WEB
        </a>
        <a id="download-btn" class="ar-button" href="video.mp4" download="video_marcapais.mp4">
            📥 GUARDAR VIDEO
        </a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        <img id="logo-img" src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        
        <a-video src="#ar-video" width="1" height="0.56" position="0 0 0"></a-video>

        <a-image src="#logo-img" width="0.4" height="0.4" position="0 0.6 0.1"
                 animation="property: position; to: 0 0.65 0.1; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        </a-image>

      </a-entity>
      
    </a-scene>

    <script>
      const video = document.querySelector('#ar-video');
      const webBtn = document.querySelector('#web-btn');
      const downloadBtn = document.querySelector('#download-btn');
      const targetEntity = document.querySelector('#ar-target');
      const guide = document.querySelector('#scanning-guide');

      targetEntity.addEventListener("targetFound", event => {
        guide.style.display = "none";
        webBtn.style.display = "block";
        downloadBtn.style.display = "block";
        video.play();
      });

      targetEntity.addEventListener("targetLost", event => {
        guide.style.display = "block";
        webBtn.style.display = "none";
        downloadBtn.style.display = "none";
        video.pause();
      });
    </script>
</body>
</html>
