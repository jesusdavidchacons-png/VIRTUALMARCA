<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marca País AR - Fix Cámara</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root { --font-main: 'Montserrat', sans-serif; }
        
        /* IMPORTANTE: El fondo debe ser transparente para ver la cámara */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: var(--font-main);
            background-color: transparent !important;
        }

        /* Pantalla de Inicio (La Cortina) */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #004a99; /* Azul sólido */
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999; color: white;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 16px 45px; background: white; color: #004a99;
            border: none; border-radius: 4px; font-weight: 600;
            letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
        }

        /* UI de Escaneo */
        #ui-overlay {
            position: fixed; bottom: 50px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; z-index: 1000; pointer-events: none;
            visibility: hidden;
        }

        .ar-button {
            display: none; align-items: center; justify-content: center;
            padding: 12px 30px; border-radius: 4px; background: white;
            color: #1a1a1a; text-decoration: none; font-weight: 500;
            font-size: 0.8em; letter-spacing: 1.5px; text-transform: uppercase;
            pointer-events: auto; min-width: 240px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #web-btn { background: #004a99; color: white; }
        #web-btn img { height: 18px; margin-right: 12px; filter: brightness(0) invert(1); }

        #scanning-guide {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; z-index: 1000; font-weight: 300; letter-spacing: 3px;
            text-transform: uppercase; visibility: hidden;
        }

        /* Ocultar elementos internos de MindAR que puedan tapar */
        .mindar-ui-loading, .mindar-ui-scanning { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" alt="Logo" style="width:120px; margin-bottom:40px;">
        <button id="start-btn">Comenzar</button>
    </div>

    <div id="scanning-guide">Escaneando Tarjeta</div>

    <div id="ui-overlay">
        <a id="web-btn" class="ar-button" href="https://marcapais.com.ve/" target="_blank">
            <img src="https://i.postimg.cc/PJWH8MRj/azul-menu-(1).png" alt="Logo">
            Marca País Web
        </a>
        <a id="download-btn" class="ar-button" href="video.mp4" download>Guardar Video</a>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, alpha: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startScreen = document.querySelector('#start-screen');
      const startBtn = document.querySelector('#start-btn');
      const video = document.querySelector('#ar-video');
      const uiOverlay = document.querySelector('#ui-overlay');
      const guide = document.querySelector('#scanning-guide');

      startBtn.addEventListener('click', () => {
        // Desbloqueamos el audio
        video.play().then(() => video.pause()).catch(e => console.log(e));

        // Desvanecer cortina azul
        startScreen.style.opacity = '0';
        setTimeout(() => {
            startScreen.style.display = 'none';
            uiOverlay.style.visibility = 'visible';
            guide.style.visibility = 'visible';
            
            // FORZAR REDIBUJADO DE CÁMARA
            window.dispatchEvent(new Event('resize'));
        }, 500);
      });

      const target = document.querySelector('#ar-target');
      target.addEventListener("targetFound", () => {
        guide.style.visibility = "hidden";
        document.querySelectorAll('.ar-button').forEach(b => b.style.display = 'flex');
        video.play();
      });

      target.addEventListener("targetLost", () => {
        guide.style.visibility = "visible";
        document.querySelectorAll('.ar-button').forEach(b => b.style.display = 'none');
        video.pause();
      });
    </script>
</body>
</html>
