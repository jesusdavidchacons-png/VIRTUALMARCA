<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencia AR - Tarjeta Interactiva</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }

        /* Contenedor de la interfaz de usuario */
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            padding-bottom: 50px;
        }

        /* Botón de descarga */
        #download-btn {
            background-color: #ffffff;
            color: #333;
            padding: 12px 25px;
            border-radius: 25px;
            font-family: sans-serif;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none; /* Oculto hasta detectar la imagen */
            pointer-events: auto;
            animation: pulse 2s infinite;
        }

        /* Mensaje de guía para el usuario */
        #scanning-guide {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            background: rgba(0,0,0,0.3);
            padding: 10px 0;
            z-index: 100;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="scanning-guide">Apunta tu cámara a la tarjeta</div>

    <div id="ui-overlay">
        <a id="download-btn" href="video.mp4" download="mi_regalo_ar.mp4">
            📥 GUARDAR VIDEO
        </a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="example-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const video = document.querySelector('#ar-video');
      const downloadBtn = document.querySelector('#download-btn');
      const targetEntity = document.querySelector('#example-target');
      const guide = document.querySelector('#scanning-guide');

      // Evento: Tarjeta detectada
      targetEntity.addEventListener("targetFound", event => {
        console.log("Tarjeta detectada");
        guide.style.display = "none";
        downloadBtn.style.display = "block";
        video.play();
      });

      // Evento: Tarjeta perdida de vista
      targetEntity.addEventListener("targetLost", event => {
        console.log("Tarjeta perdida");
        guide.style.display = "block";
        downloadBtn.style.display = "none";
        video.pause();
      });
    </script>
</body>
</html>
